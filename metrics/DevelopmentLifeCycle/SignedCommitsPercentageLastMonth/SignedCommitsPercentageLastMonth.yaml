# ====== Metadata ======
id: 4ba3ef70-6cf6-38b3-8b50-dabe3d1a427c
name: SignedCommitsPercentageLastMonth
description: This rule verifies that the [CodeRepository]'s [p1:signedCommitsPercentageLastMonth] exceeds the minimum acceptable threshold for cryptographically signed commits in the last 30 days (0.0-1.0 scale).
category: DevelopmentLifeCycle
version: "v1"
comments: The [p1:signedCommitsPercentageLastMonth] property tracks the fraction of cryptographically signed commits over the last 30 days. Signed commits use signatures to verify author identity and ensure code integrity. This rule enforces high signature rates for enhanced repository security and reliable change history.
# ====== Configuration ======
configuration:
  p1:
    operator: ">="
    targetValue: 0.8
