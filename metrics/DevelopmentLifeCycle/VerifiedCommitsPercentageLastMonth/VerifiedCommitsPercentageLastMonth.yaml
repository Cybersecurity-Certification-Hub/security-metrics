# ====== Metadata ======
id: f341ff46-5913-3903-a69b-da29e00bb69f
name: VerifiedCommitsPercentageLastMonth
description: This rule verifies that the [CodeRepository]'s [VerifiedCommits] [p1:percentageLastMonth] exceeds the minimum acceptable threshold for verified commits in the last 30 days.
category: DevelopmentLifeCycle
version: "v1"
comments: Measures the percentage of commits successfully validated through cryptographic signature verification over the last 30 days. Verified commits confirm that signatures match trusted public keys, ensuring author authenticity and code integrity. Rule enforces high verification rates for a secure and trustworthy repository history.
# ====== Configuration ======
configuration:
  p1:
    operator: ">="
    targetValue: 0.8
